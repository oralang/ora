# Ora's kernel-checked formal package. The formal-sync gate builds this tree to
# validate compiler snapshots and production proof-gate decisions; supported
# userland proof paths also invoke Lean as an external checker. Lean is not
# linked into the `ora` compiler binary.
#
# The package deliberately has no external dependencies. Keeping the trusted
# surface to Lean core makes the `decide`-based gates fast and reproducible.
# Adding a dependency requires explicit trust-surface review and measurement of
# its gate-time impact. See README.md ("Dependency posture").

name = "ora"
defaultTargets = ["Ora"]

[[lean_lib]]
name = "Ora"
